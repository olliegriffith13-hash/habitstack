      const [showNudge, setShowNudge] = useState(null);
      const [noteModal, setNoteModal] = useState(null);
      const [noteText, setNoteText] = useState("");
      const [showMood, setShowMood] = useState(false);
      const [expandedHabit, setExpandedHabit] = useState(null);
      const [newAchievement, setNewAchievement] = useState(null);

      useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }, [data]);

      const todayKey = getTodayKey();
      const todayComp = data.completions[todayKey] || { done:[], missed:[], mood:null, notes:{} };
      const isDark = (data.theme||"dark") === "dark";
      const bg = isDark ? "#07070f" : "#f8fafc";
      const surface = isDark ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.04)";
      const border = isDark ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.08)";
      const text = isDark ? "#f0f0f0" : "#0f172a";
      const muted = isDark ? "#6b7280" : "#94a3b8";
      const card = isDark ? "#13131f" : "#ffffff";

      const allHabits = data.habits;
      const buildHabits = allHabits.filter(h=>h.type!=="break"&&!data.pausedHabits?.includes(h.id)&&isScheduledToday(h));
      const breakHabits = allHabits.filter(h=>h.type==="break");
      const pausedHabits = allHabits.filter(h=>data.pausedHabits?.includes(h.id));
      const totalXP = getTotalXP(allHabits, data.completions);
      const charLevelIndex = getCharLevelIndex(data.character, totalXP);
      const charLevel = getCharLevel(data.character, totalXP);
      const nextLevel = [...CHARACTERS[data.character].levels].find(l=>l.min>totalXP);
      const charObj = CHARACTERS[data.character];
      const todayDoneBuild = buildHabits.filter(h=>todayComp.done?.includes(h.id)).length;
      const todayPct = buildHabits.length ? Math.round((todayDoneBuild/buildHabits.length)*100) : 0;
      const weekDays = getWeekDays();
      const totalCompletions = Object.values(data.completions).reduce((s,c)=>s+(c.done?.length||0),0);
      const longestEverStreak = allHabits.reduce((m,h)=>Math.max(m,getLongestStreak(h.id,data.completions)),0);

      useEffect(() => {
        const earned = data.earnedAchievements || [];
        for(const ach of ACHIEVEMENTS) {
          if(!earned.includes(ach.id) && ach.check(data, todayKey)) {
            setData(p=>({...p,earnedAchievements:[...(p.earnedAchievements||[]),ach.id]}));
            setNewAchievement(ach); playMilestone();
            setTimeout(()=>setNewAchievement(null), 4000); break;
          }
        }
      }, [data.completions, data.habits]);

      useEffect(() => {
        const timers = [];
        if("Notification" in window) {
          allHabits.filter(h=>h.notificationTime&&h.type!=="break").forEach(habit=>{
            const [hh,mm] = habit.notificationTime.split(":").map(Number);
            const now = new Date(); const fire = new Date();
            fire.setHours(hh,mm,0,0);
            if(fire<=now) fire.setDate(fire.getDate()+1);
            const t = setTimeout(()=>{ if(Notification.permission==="granted"&&!(data.completions[getTodayKey()]?.done||[]).includes(habit.id)) new Notification("HabitStack 🧱",{body:`Time for: ${habit.name}`}); }, fire-now);
            timers.push(t);
          });
        }
        return () => timers.forEach(clearTimeout);
      }, [allHabits]);

      useEffect(() => {
        const weekKey = weekDays[0];
        if(!(data.freezeEarnedWeeks||[]).includes(weekKey)) {
          const perfect = weekDays.filter(d=>{ const dc=data.completions[d]||{done:[]}; const bh=allHabits.filter(h=>h.type!=="break"); return bh.length>0&&bh.every(h=>dc.done?.includes(h.id)); }).length;
          if(perfect>=7) setData(p=>({...p,freezeTokens:(p.freezeTokens||0)+1,freezeEarnedWeeks:[...(p.freezeEarnedWeeks||[]),weekKey]}));
        }
      }, []);

      useEffect(() => {
        const n = buildHabits.find(h=>shouldNudge(h,data.completions)&&!h.nudgeDismissed);
        if(n) setShowNudge(n);
      }, []);

      const setTodayComp = (updater) => { setData(p=>{ const ex=p.completions[todayKey]||{done:[],missed:[],mood:null,notes:{}}; return {...p,completions:{...p.completions,[todayKey]:updater(ex)}}; }); };
      const markDone = (id) => {
        setTodayComp(c=>({...c,done:[...(c.done||[]).filter(x=>x!==id),id],missed:(c.missed||[]).filter(x=>x!==id)}));
        setCelebId(id); setTimeout(()=>setCelebId(null),700); playTick();
        const streak = getStreak(id,data.completions)+1;
        if([7,21,50,100].includes(streak)){ const h=allHabits.find(h=>h.id===id); setMilestone({streak,name:h?.name||""}); playMilestone(); setTimeout(()=>setMilestone(null),3500); }
        const allDone = buildHabits.filter(h=>h.id!==id).every(h=>(todayComp.done||[]).includes(h.id));
        if(allDone&&buildHabits.length>0) setTimeout(()=>setShowMood(true),900);
      };
      const markMissed = (id) => { setTodayComp(c=>({...c,missed:[...(c.missed||[]).filter(x=>x!==id),id],done:(c.done||[]).filter(x=>x!==id)})); };
      const clearHabit = (id) => { setTodayComp(c=>({...c,done:(c.done||[]).filter(x=>x!==id),missed:(c.missed||[]).filter(x=>x!==id)})); };
      const markClean = (id) => { setTodayComp(c=>({...c,done:[...(c.done||[]).filter(x=>x!==id),id]})); };
      const markRestDay = () => { setTodayComp(c=>({...c,restDay:true,done:[],missed:[]})); };
      const undoRestDay = () => { setTodayComp(c=>({...c,restDay:false})); };
      const useFreeze = () => { if((data.freezeTokens||0)<1)return; const yd=new Date(); yd.setDate(yd.getDate()-1); const yk=yd.toISOString().split("T")[0]; const yc=data.completions[yk]||{done:[],missed:[]}; setData(p=>({...p,freezeTokens:(p.freezeTokens||0)-1,freezeUsedTotal:(p.freezeUsedTotal||0)+1,completions:{...p.completions,[yk]:{...yc,done:[...new Set([...(yc.done||[]),...allHabits.filter(h=>h.type!=="break").map(h=>h.id)])]}}})); };
      const addHabit = (h) => { setData(p=>({...p,habits:[...p.habits,{...h,id:Date.now().toString(),createdAt:todayKey}]})); };
      const deleteHabit = (id) => setData(p=>({...p,habits:p.habits.filter(h=>h.id!==id)}));
      const togglePause = (id) => setData(p=>({...p,pausedHabits:p.pausedHabits?.includes(id)?p.pausedHabits.filter(x=>x!==id):[...(p.pausedHabits||[]),id]}));
      const dismissNudge = (id) => { setData(p=>({...p,habits:p.habits.map(h=>h.id===id?{...h,nudgeDismissed:true}:h)})); setShowNudge(null); };
      const characterSays = () => { if(allHabits.length===0)return CHARACTER_SAYS.start[0]; const arr=todayPct===100?CHARACTER_SAYS.perfect:todayPct>=50?CHARACTER_SAYS.good:CHARACTER_SAYS.bad; return arr[Math.floor(Date.now()/86400000)%arr.length]; };

      const weeklyStats = allHabits.map(h=>({...h,weekDone:weekDays.filter(d=>(data.completions[d]?.done||[]).includes(h.id)).length,streak:getStreak(h.id,data.completions)}));
      const bwStats = weeklyStats.filter(h=>h.type!=="break");
      const totalWeekly = bwStats.reduce((s,h)=>s+h.weekDone,0);
      const maxPossible = buildHabits.length*7;
      const weekPct = maxPossible?Math.round((totalWeekly/maxPossible)*100):0;
      const bestStreak = weeklyStats.reduce((m,h)=>Math.max(m,h.streak),0);
      const perfectDays = weekDays.filter(d=>{ const dc=data.completions[d]||{done:[]}; const bh=allHabits.filter(h=>h.type!=="break"); return bh.length>0&&bh.every(h=>dc.done?.includes(h.id)); }).length;
      const mostConsistent = [...bwStats].sort((a,b)=>b.weekDone-a.weekDone)[0];
      const needsWork = [...bwStats].filter(h=>h.weekDone<7).sort((a,b)=>a.weekDone-b.weekDone)[0];
      const earned = data.earnedAchievements||[];
      const isOnboarded = data.onboardStep>=3;
      if(!isOnboarded) return <Onboarding data={data} setData={setData} isDark={isDark} />;

      return (
        <div style={{minHeight:"100vh",background:bg,fontFamily:"'DM Sans','Segoe UI',sans-serif",color:text,paddingBottom:"40px"}}>
          {newAchievement&&(<div style={{position:"fixed",top:"20px",left:"50%",transform:"translateX(-50%)",zIndex:300,background:"linear-gradient(135deg,#f59e0b,#f97316)",borderRadius:"14px",padding:"14px 20px",boxShadow:"0 8px 32px rgba(245,158,11,0.4)",textAlign:"center",minWidth:"240px"}}><div style={{fontSize:"28px",marginBottom:"4px"}}>{newAchievement.icon}</div><div style={{fontSize:"14px",fontWeight:800,color:"white"}}>Achievement Unlocked!</div><div style={{fontSize:"12px",color:"rgba(255,255,255,0.9)",marginTop:"2px"}}>{newAchievement.title}</div></div>)}
          {milestone&&(<div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,pointerEvents:"none"}}><div style={{background:"linear-gradient(135deg,#8b5cf6,#3b82f6)",borderRadius:"20px",padding:"24px 32px",textAlign:"center",boxShadow:"0 0 60px rgba(139,92,246,0.5)"}}><div style={{fontSize:"48px",marginBottom:"8px"}}>🔥</div><div style={{fontSize:"22px",fontWeight:900,color:"white"}}>{milestone.streak} DAY STREAK!</div><div style={{fontSize:"13px",color:"rgba(255,255,255,0.85)",marginTop:"4px"}}>{milestone.name}</div></div></div>)}
          {showNudge&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}><div style={{background:card,border:"1px solid rgba(245,158,11,0.3)",borderRadius:"20px",padding:"28px",maxWidth:"340px",width:"100%",textAlign:"center"}}><div style={{fontSize:"36px",marginBottom:"8px"}}>🚀</div><div style={{fontSize:"17px",fontWeight:800,color:text,marginBottom:"8px"}}>Ready to level up?</div><div style={{fontSize:"13px",color:muted,marginBottom:"14px",lineHeight:"1.6"}}>You've nailed <span style={{color:text,fontWeight:600}}>{showNudge.name}</span> for 7 days!</div><div style={{background:"rgba(245,158,11,0.1)",borderRadius:"10px",padding:"12px",marginBottom:"20px",fontSize:"12px",color:"#fbbf24",lineHeight:"1.7"}}>Started: <strong>{showNudge.startTarget}</strong><br/>Goal: <strong>{showNudge.goal}</strong></div><div style={{display:"flex",gap:"8px"}}><button onClick={()=>dismissNudge(showNudge.id)} style={{flex:1,padding:"11px",background:surface,border:"none",borderRadius:"10px",color:muted,fontSize:"12px",cursor:"pointer"}}>Not yet</button><button onClick={()=>dismissNudge(showNudge.id)} style={{flex:2,padding:"11px",background:"linear-gradient(135deg,#f59e0b,#f97316)",border:"none",borderRadius:"10px",color:"white",fontSize:"13px",fontWeight:700,cursor:"pointer"}}>Let's push it! 💪</button></div></div></div>)}
          {showMood&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}><div style={{background:card,border:"1px solid rgba(139,92,246,0.3)",borderRadius:"20px",padding:"28px",maxWidth:"300px",width:"100%",textAlign:"center"}}><div style={{fontSize:"28px",marginBottom:"8px"}}>🎯</div><div style={{fontSize:"16px",fontWeight:700,color:text,marginBottom:"6px"}}>Stack complete!</div><div style={{fontSize:"13px",color:muted,marginBottom:"20px"}}>How are you feeling?</div><div style={{display:"flex",justifyContent:"center",gap:"12px",marginBottom:"16px"}}>{MOODS.map((m,i)=>(<button key={i} onClick={()=>{setTodayComp(c=>({...c,mood:i}));setShowMood(false);}} style={{fontSize:"28px",background:"none",border:"none",cursor:"pointer",padding:"4px"}}>{m}</button>))}</div><button onClick={()=>setShowMood(false)} style={{fontSize:"11px",color:muted,background:"none",border:"none",cursor:"pointer"}}>Skip</button></div></div>)}
          {noteModal&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}><div style={{background:card,border:`1px solid ${border}`,borderRadius:"20px",padding:"24px",maxWidth:"360px",width:"100%"}}><div style={{fontSize:"15px",fontWeight:700,color:text,marginBottom:"12px"}}>📝 Add a note</div><textarea value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="How did it go?" style={{width:"100%",background:surface,border:`1px solid ${border}`,borderRadius:"10px",padding:"10px 12px",color:text,fontSize:"13px",outline:"none",resize:"none",height:"90px",boxSizing:"border-box"}}/><div style={{display:"flex",gap:"8px",marginTop:"12px"}}><button onClick={()=>{setNoteModal(null);setNoteText("");}} style={{flex:1,padding:"10px",background:surface,border:"none",borderRadius:"10px",color:muted,fontSize:"13px",cursor:"pointer"}}>Cancel</button><button onClick={()=>{setTodayComp(c=>({...c,notes:{...(c.notes||{}),[noteModal]:noteText}}));setNoteModal(null);setNoteText("");}} style={{flex:2,padding:"10px",background:"linear-gradient(135deg,#8b5cf6,#3b82f6)",border:"none",borderRadius:"10px",color:"white",fontSize:"13px",fontWeight:700,cursor:"pointer"}}>Save note</button></div></div></div>)}

          <div style={{background:isDark?"linear-gradient(180deg,#0d0d1e,#07070f)":card,borderBottom:`1px solid ${border}`,padding:"14px 20px 0",position:"sticky",top:0,zIndex:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <div style={{width:"44px",height:"44px",cursor:"pointer"}} onClick={()=>setView("avatar")}>
                  <AvatarSVG charKey={data.character} levelIndex={charLevelIndex} size={44} aura={charLevel.aura}/>
                </div>
                <div>
                  <div style={{fontSize:"13px",fontWeight:700,color:text,lineHeight:1}}>{charLevel.title}</div>
                  <div style={{fontSize:"10px",color:muted,marginTop:"1px"}}>{nextLevel?`${nextLevel.min-totalXP} XP to ${nextLevel.title}`:"MAX LEVEL 👑"}</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                <button onClick={()=>setData(p=>({...p,theme:p.theme==="dark"?"light":"dark"}))} style={{background:"none",border:"none",fontSize:"16px",cursor:"pointer",padding:"4px"}}>{isDark?"☀️":"🌙"}</button>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:"26px",fontWeight:800,lineHeight:1,color:todayPct===100?"#22c55e":text}}>{todayPct}%</div>
                  <div style={{fontSize:"9px",color:muted}}>{todayDoneBuild}/{buildHabits.length}</div>
                </div>
              </div>
            </div>
            <div style={{height:"3px",background:isDark?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.05)",borderRadius:"2px",marginBottom:"12px",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${todayPct}%`,background:todayPct===100?"linear-gradient(90deg,#22c55e,#86efac)":"linear-gradient(90deg,#8b5cf6,#3b82f6)",borderRadius:"2px",transition:"width 0.5s ease"}}/>
            </div>
            <div style={{display:"flex",overflowX:"auto",gap:0}}>
              {[["today","Today"],["week","Week"],["avatar","Avatar"],["stats","Stats"],["break","Break"],["settings","⚙️"]].map(([v,l])=>(
                <button key={v} onClick={()=>setView(v)} style={{background:"none",border:"none",color:view===v?text:muted,fontSize:"11px",fontWeight:view===v?700:400,padding:"7px 12px",cursor:"pointer",borderBottom:view===v?"2px solid #8b5cf6":"2px solid transparent",whiteSpace:"nowrap",flexShrink:0,transition:"all 0.2s"}}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{padding:"16px 20px",maxWidth:"480px",margin:"0 auto"}}>
            {view==="today"&&(
              <div>
                <div style={{background:surface,border:`1px solid ${border}`,borderRadius:"12px",padding:"12px 14px",marginBottom:"12px"}}>
                  <div style={{fontSize:"11px",color:muted,fontStyle:"italic",marginBottom:"6px"}}>"{getDailyQuote()}"</div>
                  <div style={{fontSize:"11px",color:charLevel.aura,fontWeight:600}}>{charObj.name} says: "{characterSays()}"</div>
                </div>
                {todayComp.restDay&&(<div style={{background:"rgba(139,92,246,0.08)",border:"1px solid rgba(139,92,246,0.2)",borderRadius:"12px",padding:"12px 14px",marginBottom:"12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{fontSize:"13px",color:"#a78bfa"}}>😴 Rest day — streaks protected!</div><button onClick={undoRestDay} style={{background:"rgba(139,92,246,0.15)",border:"1px solid rgba(139,92,246,0.3)",borderRadius:"8px",padding:"5px 10px",color:"#a78bfa",fontSize:"11px",fontWeight:600,cursor:"pointer",marginLeft:"10px"}}>↩ Undo</button></div>)}
                {(data.freezeTokens||0)>0&&(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(245,158,11,0.07)",border:"1px solid rgba(245,158,11,0.18)",borderRadius:"10px",padding:"9px 14px",marginBottom:"12px"}}><div style={{fontSize:"11px",color:"#fbbf24"}}>🧊 {data.freezeTokens} streak freeze{data.freezeTokens!==1?"s":""} available</div><button onClick={useFreeze} style={{background:"rgba(245,158,11,0.18)",border:"none",borderRadius:"7px",padding:"4px 10px",color:"#fbbf24",fontSize:"11px",cursor:"pointer",fontWeight:600}}>Use</button></div>)}
                {todayPct===100&&buildHabits.length>0&&!todayComp.restDay&&(<div style={{background:"linear-gradient(135deg,rgba(34,197,94,0.12),rgba(134,239,172,0.06))",border:"1px solid rgba(34,197,94,0.22)",borderRadius:"12px",padding:"12px 16px",marginBottom:"12px",textAlign:"center",fontSize:"13px",fontWeight:600,color:"#86efac"}}>🎉 Full stack! {charLevel.title} grows stronger!</div>)}
                {buildHabits.length===0?(
                  <div style={{textAlign:"center",padding:"40px 16px",color:muted}}>
                    <div style={{fontSize:"36px",marginBottom:"10px"}}>🧱</div>
                    <div style={{fontSize:"14px",fontWeight:600,color:text,marginBottom:"6px"}}>Your stack is empty</div>
                    <div style={{fontSize:"12px",marginBottom:"20px"}}>Start with one habit. Build from there.</div>
                    <button onClick={()=>setShowTemplates(true)} style={{background:"rgba(139,92,246,0.12)",border:"1px solid rgba(139,92,246,0.25)",borderRadius:"10px",padding:"10px 18px",color:"#a78bfa",fontSize:"13px",fontWeight:600,cursor:"pointer"}}>Browse starter templates</button>
                  </div>
                ):(
                  TIMES.map(time=>{
                    const habits=buildHabits.filter(h=>h.time===time);
                    if(!habits.length)return null;
                    return (
                      <div key={time} style={{marginBottom:"20px"}}>
                        <div style={{fontSize:"10px",fontWeight:700,color:muted,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>{TIME_LABELS[time]}</div>
                        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                          {habits.map(habit=>{
                            const done=todayComp.done?.includes(habit.id);
                            const missed=todayComp.missed?.includes(habit.id);
                            const streak=getStreak(habit.id,data.completions);
                            const longest=getLongestStreak(habit.id,data.completions);
                            const celebrating=celebId===habit.id;
                            const note=todayComp.notes?.[habit.id];
                            const diff=DIFFICULTY[habit.difficulty||"easy"];
                            const expanded=expandedHabit===habit.id;
                            return (
                              <div key={habit.id} style={{background:done?`linear-gradient(135deg,${habit.color}14,${habit.color}05)`:missed?"rgba(239,68,68,0.05)":surface,border:`1px solid ${done?habit.color+"32":missed?"rgba(239,68,68,0.18)":border}`,borderRadius:"14px",overflow:"hidden",transform:celebrating?"scale(1.01)":"scale(1)",transition:"all 0.2s"}}>
                                <div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:"10px"}}>
                                  <div style={{width:"36px",height:"36px",borderRadius:"9px",flexShrink:0,background:done?habit.color+"25":missed?"rgba(239,68,68,0.1)":surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px"}}>{done?"✅":missed?"❌":habit.icon}</div>
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontSize:"13px",fontWeight:600,color:done?habit.color:missed?muted:text,textDecoration:(done||missed)?"line-through":"none",opacity:missed?0.6:1}}>{habit.name}</div>
                                    {habit.anchor&&<div style={{fontSize:"10px",color:muted,marginTop:"1px"}}>📎 After → {habit.anchor}</div>}
                                    <div style={{display:"flex",alignItems:"center",gap:"6px",marginTop:"2px"}}>
                                      <span style={{fontSize:"9px",color:diff.color,fontWeight:600}}>{diff.label}</span>
                                      <span style={{fontSize:"9px",color:muted}}>+{diff.xp}XP</span>
                                      {streak>0&&<span style={{fontSize:"10px",fontWeight:700,color:streak>=14?"#f59e0b":streak>=7?"#8b5cf6":muted}}>🔥{streak}</span>}
                                      {streak>0&&longest>streak&&<span style={{fontSize:"9px",color:muted}}>best:{longest}</span>}
                                    </div>
                                  </div>
                                  <button onClick={()=>setExpandedHabit(expanded?null:habit.id)} style={{background:"none",border:"none",color:muted,cursor:"pointer",fontSize:"14px",padding:"4px",flexShrink:0}}>{expanded?"▲":"▼"}</button>
                                </div>

                </div>
                <div style={{background:surface,border:`1px solid ${border}`,borderRadius:"14px",padding:"14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:"12px",fontWeight:700,color:text}}>🎨 Theme</div><button onClick={()=>setData(p=>({...p,theme:p.theme==="dark"?"light":"dark"}))} style={{background:"rgba(139,92,246,0.12)",border:"1px solid rgba(139,92,246,0.25)",borderRadius:"8px",padding:"6px 14px",color:"#a78bfa",fontSize:"12px",cursor:"pointer"}}>{isDark?"Switch to Light ☀️":"Switch to Dark 🌙"}</button></div>
                </div>
                <div style={{background:surface,border:`1px solid ${border}`,borderRadius:"14px",padding:"14px"}}>
                  <div style={{fontSize:"11px",color:muted,marginBottom:"10px"}}>⚠️ Danger zone</div>
                  <button onClick={()=>{if(window.confirm("Reset all data?")){ localStorage.removeItem(STORAGE_KEY); window.location.reload(); }}} style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.16)",borderRadius:"8px",color:"#f87171",fontSize:"11px",padding:"8px 14px",cursor:"pointer"}}>Reset everything</button>
                </div>
              </div>
            )}
          </div>

          {showTemplates&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={e=>e.target===e.currentTarget&&setShowTemplates(false)}><div style={{background:card,border:`1px solid ${border}`,borderRadius:"20px 20px 0 0",padding:"22px",width:"100%",maxWidth:"480px",margin:"0 auto",maxHeight:"80vh",overflowY:"auto"}}><div style={{fontSize:"15px",fontWeight:700,color:text,marginBottom:"14px"}}>📋 Starter Templates</div><div style={{display:"flex",flexDirection:"column",gap:"10px"}}>{TEMPLATES.map(t=>(<div key={t.name} style={{background:surface,border:`1px solid ${border}`,borderRadius:"14px",padding:"14px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}}><div style={{fontSize:"13px",fontWeight:600,color:text}}>{t.emoji} {t.name}</div><button onClick={()=>{t.habits.forEach(h=>addHabit(h));setShowTemplates(false);}} style={{background:"rgba(139,92,246,0.15)",border:"none",borderRadius:"7px",padding:"5px 12px",color:"#a78bfa",fontSize:"11px",fontWeight:600,cursor:"pointer"}}>Add all</button></div><div style={{fontSize:"11px",color:muted,marginBottom:"7px"}}>{t.desc}</div>{t.habits.map(h=>(<div key={h.name} style={{fontSize:"10px",color:muted,padding:"1px 0"}}>· {h.icon} {h.name}</div>))}</div>))}</div><button onClick={()=>setShowTemplates(false)} style={{width:"100%",marginTop:"12px",padding:"12px",background:surface,border:"none",borderRadius:"12px",color:muted,fontSize:"12px",cursor:"pointer"}}>Close</button></div></div>)}
          {showAdd&&<AddHabitModal type={addType} onAdd={(h)=>{addHabit(h);setShowAdd(false);}} onClose={()=>setShowAdd(false)} existingHabits={allHabits.filter(h=>h.type!=="break")} isDark={isDark} card={card} surface={surface} border={border} text={text} muted={muted}/>}
        </div>
      );
    }

    function Onboarding({data, setData, isDark}) {
      const [step, setStep] = useState(data.onboardStep||0);
      const [selectedChar, setSelectedChar] = useState(data.character||null);
      const [anchors, setAnchors] = useState([
        {id:"a1",time:"morning",name:"",icon:"☕",placeholder:"e.g. Make morning coffee"},
        {id:"a2",time:"morning",name:"",icon:"🚿",placeholder:"e.g. Have a shower"},
        {id:"a3",time:"afternoon",name:"",icon:"🥗",placeholder:"e.g. Eat lunch"},
        {id:"a4",time:"evening",name:"",icon:"📺",placeholder:"e.g. Watch TV / relax"},
      ]);
      const text = isDark?"#f0f0f0":"#0f172a"; const muted = isDark?"#9ca3af":"#94a3b8"; const card = isDark?"#13131f":"#ffffff";
      const advance = () => {
        if(step===0&&!selectedChar)return;
        if(step===0)setData(p=>({...p,character:selectedChar}));
        if(step===1){const filled=anchors.filter(a=>a.name.trim()); const habits=filled.map(a=>({...a,id:Date.now().toString()+a.id,type:"existing",anchor:"",color:COLORS[Math.floor(Math.random()*COLORS.length)],goal:"",startTarget:"",difficulty:"easy",createdAt:getTodayKey()})); setData(p=>({...p,habits:[...p.habits,...habits]}));}
        if(step===2){setData(p=>({...p,onboardStep:3}));return;}
        setStep(s=>s+1); setData(p=>({...p,onboardStep:step+1}));
      };
      return (
        <div style={{minHeight:"100vh",background:isDark?"#07070f":"#f8fafc",fontFamily:"'DM Sans','Segoe UI',sans-serif",color:text,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
          <div style={{maxWidth:"380px",width:"100%"}}>
            <div style={{display:"flex",justifyContent:"center",gap:"6px",marginBottom:"28px"}}>{[0,1,2].map(i=>(<div key={i} style={{width:i===step?20:6,height:6,borderRadius:3,background:i<=step?"#8b5cf6":"rgba(139,92,246,0.2)",transition:"all 0.3s"}}/>))}</div>
            {step===0&&(<div style={{textAlign:"center"}}><div style={{fontSize:"36px",marginBottom:"10px"}}>🧱</div><div style={{fontSize:"22px",fontWeight:800,marginBottom:"8px",color:text}}>Welcome to HabitStack</div><div style={{fontSize:"13px",color:muted,marginBottom:"28px",lineHeight:"1.7"}}>Stack new habits onto things you already do.<br/>Break the ones holding you back.<br/>Watch your character grow stronger every day.</div><div style={{fontSize:"12px",fontWeight:700,color:"#a78bfa",marginBottom:"12px",textAlign:"left"}}>Choose your character</div><div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"8px",marginBottom:"16px"}}>{Object.entries(CHARACTERS).map(([key,char])=>(<button key={key} onClick={()=>setSelectedChar(key)} style={{background:selectedChar===key?"rgba(139,92,246,0.22)":"rgba(255,255,255,0.04)",border:`2px solid ${selectedChar===key?"#8b5cf6":"transparent"}`,borderRadius:"12px",padding:"10px 4px",cursor:"pointer",textAlign:"center"}}><AvatarSVG charKey={key} levelIndex={0} size={40} aura={selectedChar===key?"#8b5cf6":"#6b7280"}/><div style={{fontSize:"8px",color:muted,marginTop:"4px"}}>{char.name}</div></button>))}</div>{selectedChar&&<div style={{fontSize:"11px",color:muted,marginBottom:"20px",fontStyle:"italic"}}>{CHARACTERS[selectedChar].desc}</div>}</div>)}
            {step===1&&(<div><div style={{fontSize:"19px",fontWeight:800,marginBottom:"8px",color:text}}>What do you already do? 📋</div><div style={{fontSize:"13px",color:muted,marginBottom:"6px",lineHeight:"1.6"}}>These are your <span style={{color:"#a78bfa",fontWeight:600}}>anchor habits</span> — things you do every day without thinking.</div><div style={{fontSize:"11px",color:muted,marginBottom:"18px"}}>Fill in as many as you like.</div><div style={{display:"flex",flexDirection:"column",gap:"9px",marginBottom:"20px"}}>{anchors.map(a=>(<div key={a.id} style={{display:"flex",alignItems:"center",gap:"10px"}}><div style={{fontSize:"20px",flexShrink:0}}>{a.icon}</div><input value={a.name} onChange={e=>setAnchors(p=>p.map(x=>x.id===a.id?{...x,name:e.target.value}:x))} placeholder={a.placeholder} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"10px",padding:"10px 12px",color:text,fontSize:"13px",outline:"none"}}/><div style={{fontSize:"9px",color:muted,flexShrink:0}}>{a.time}</div></div>))}</div></div>)}
            {step===2&&(<div style={{textAlign:"center"}}><div style={{marginBottom:"16px",display:"flex",justifyContent:"center"}}>{selectedChar&&<AvatarSVG charKey={selectedChar||data.character} levelIndex={0} size={100} aura="#8b5cf6"/>}</div><div style={{fontSize:"19px",fontWeight:800,marginBottom:"8px",color:text}}>You're all set! 🚀</div><div style={{fontSize:"13px",color:muted,marginBottom:"16px",lineHeight:"1.6"}}>Your anchors are loaded. Start stacking new habits on top.</div><div style={{background:"rgba(139,92,246,0.1)",border:"1px solid rgba(139,92,246,0.2)",borderRadius:"12px",padding:"14px",marginBottom:"20px",textAlign:"left"}}><div style={{fontSize:"10px",fontWeight:700,color:"#a78bfa",marginBottom:"8px",textTransform:"uppercase",letterSpacing:"0.5px"}}>How it works</div><div style={{fontSize:"12px",color:isDark?"#d1d5db":"#374151",lineHeight:"1.8"}}>📎 <strong>Anchor</strong> — something you already do every day<br/>🆕 <strong>New habit</strong> — what you want to achieve<br/>🎯 <strong>Start small</strong> — 10 mins beats 0 mins every time<br/>🔥 <strong>Streaks</strong> — your character levels up as you build<br/>❌ <strong>Missed</strong> — honest tracking builds real awareness<br/>🚫 <strong>Break habits</strong> — track what you're quitting</div></div></div>)}
            <button onClick={advance} style={{width:"100%",padding:"14px",background:step===0&&!selectedChar?"rgba(255,255,255,0.08)":"linear-gradient(135deg,#8b5cf6,#3b82f6)",border:"none",borderRadius:"12px",color:"white",fontSize:"14px",fontWeight:700,cursor:step===0&&!selectedChar?"not-allowed":"pointer",opacity:step===0&&!selectedChar?0.4:1}}>
              {step===0?"Choose this character →":step===1?(anchors.filter(a=>a.name.trim()).length>0?"Add my anchors & continue →":"Skip for now →"):"Start stacking! 🧱"}
            </button>
          </div>
        </div>
      );
    }

    function AddHabitModal({type, onAdd, onClose, existingHabits, isDark, card, surface, border, text, muted}) {
      const [h, setH] = useState({name:"",type:type==="break"?"break":"build",anchor:"",icon:"🎯",color:"#22c55e",time:"morning",goal:"",startTarget:"",difficulty:"easy",costPerUnit:"",unitsPerDay:"",unit:"cigarettes",scheduleDays:[],notificationTime:""});
      const SUGG = {morning:["Drink a glass of water","5 mins stretching","Read for 10 minutes","Cold shower","Meditate for 5 mins","Write 3 things grateful for"],afternoon:["10 min walk","Healthy lunch","Read for 20 mins","Breathing exercise"],evening:["Review your day","Plan tomorrow","Journal 5 mins","Cook healthy meal"],night:["No screens 30 mins before bed","Read before sleep","Skincare routine"]};
      const SUGG_BREAK = ["Smoking","Vaping","Drinking alcohol","Scrolling in bed","Late night snacking","Biting nails","Too much coffee","Energy drinks"];
      const hint = h.anchor&&h.name?getStackHint(h.anchor,h.name):null;
      const yearSave = h.costPerUnit&&h.unitsPerDay?parseFloat(h.costPerUnit)*parseFloat(h.unitsPerDay)*365:0;
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div style={{background:card,border:`1px solid ${border}`,borderRadius:"20px 20px 0 0",padding:"20px",width:"100%",maxWidth:"480px",margin:"0 auto",maxHeight:"93vh",overflowY:"auto"}}>
            <div style={{fontSize:"15px",fontWeight:700,color:text,marginBottom:"14px"}}>{h.type==="break"?"🚫 Add habit to break":"🧱 Stack a new habit"}</div>
            {h.type!=="break"&&(<div style={{marginBottom:"12px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"5px"}}>Type</div><div style={{display:"flex",gap:"6px"}}>{[["existing","✅ Already do this"],["build","🆕 Want to achieve"]].map(([v,l])=>(<button key={v} onClick={()=>setH(p=>({...p,type:v}))} style={{flex:1,padding:"8px",fontSize:"11px",cursor:"pointer",background:h.type===v?"rgba(139,92,246,0.18)":surface,border:`1px solid ${h.type===v?"#8b5cf6":border}`,borderRadius:"8px",color:h.type===v?"#a78bfa":muted}}>{l}</button>))}</div></div>)}
            <div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"5px"}}>Name *</div><input value={h.name} onChange={e=>setH(p=>({...p,name:e.target.value}))} placeholder={h.type==="break"?"e.g. Smoking":"e.g. Read for 10 minutes"} style={{width:"100%",background:surface,border:`1px solid ${border}`,borderRadius:"10px",padding:"9px 12px",color:text,fontSize:"13px",outline:"none",boxSizing:"border-box"}}/></div>
            <div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,marginBottom:"5px"}}>Quick suggestions</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{(h.type==="break"?SUGG_BREAK:SUGG[h.time]||[]).slice(0,6).map(s=>(<button key={s} onClick={()=>setH(p=>({...p,name:s}))} style={{background:h.type==="break"?"rgba(239,68,68,0.07)":surface,border:`1px solid ${h.type==="break"?"rgba(239,68,68,0.12)":border}`,borderRadius:"20px",padding:"4px 10px",color:h.type==="break"?"#f87171":muted,fontSize:"10px",cursor:"pointer"}}>{s}</button>))}</div></div>
            {h.type!=="break"&&(<>
              <div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"3px"}}>Anchor habit</div><div style={{fontSize:"10px",color:muted,marginBottom:"5px"}}>Something you already do daily. Stack on top of it.</div><input value={h.anchor} onChange={e=>setH(p=>({...p,anchor:e.target.value}))} placeholder="e.g. Make my morning coffee" style={{width:"100%",background:surface,border:`1px solid ${border}`,borderRadius:"10px",padding:"9px 12px",color:text,fontSize:"13px",outline:"none",boxSizing:"border-box",marginBottom:"6px"}}/>{existingHabits.length>0&&(<div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{existingHabits.slice(0,5).map(eh=>(<button key={eh.id} onClick={()=>setH(p=>({...p,anchor:eh.name}))} style={{background:"rgba(139,92,246,0.07)",border:"1px solid rgba(139,92,246,0.14)",borderRadius:"20px",padding:"3px 9px",color:"#a78bfa",fontSize:"10px",cursor:"pointer"}}>{eh.icon} {eh.name}</button>))}</div>)}{hint&&<div style={{marginTop:"6px",padding:"7px 12px",background:hint.score>=4?"rgba(34,197,94,0.07)":"rgba(239,68,68,0.07)",border:`1px solid ${hint.score>=4?"rgba(34,197,94,0.16)":"rgba(239,68,68,0.16)"}`,borderRadius:"8px",fontSize:"10px",color:hint.score>=4?"#86efac":"#fca5a5"}}>{hint.tip}</div>}</div>
              {h.type==="build"&&(<div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"3px"}}>Progressive goal</div><div style={{fontSize:"10px",color:muted,marginBottom:"5px"}}>Start small. After 7 days we'll nudge you to step it up.</div><input value={h.startTarget} onChange={e=>setH(p=>({...p,startTarget:e.target.value}))} placeholder="Starting with (e.g. 10 mins)" style={{width:"100%",background:surface,border:`1px solid ${border}`,borderRadius:"10px",padding:"9px 12px",color:text,fontSize:"13px",outline:"none",boxSizing:"border-box",marginBottom:"6px"}}/><input value={h.goal} onChange={e=>setH(p=>({...p,goal:e.target.value}))} placeholder="End goal (e.g. Read 1 hour daily)" style={{width:"100%",background:surface,border:`1px solid ${border}`,borderRadius:"10px",padding:"9px 12px",color:text,fontSize:"13px",outline:"none",boxSizing:"border-box"}}/></div>)}
              <div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"5px"}}>Time of day</div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"5px"}}>{TIMES.map(t=>(<button key={t} onClick={()=>setH(p=>({...p,time:t}))} style={{padding:"7px 4px",fontSize:"9px",cursor:"pointer",textAlign:"center",background:h.time===t?"rgba(139,92,246,0.18)":surface,border:`1px solid ${h.time===t?"#8b5cf6":border}`,borderRadius:"8px",color:h.time===t?"#a78bfa":muted}}>{TIME_LABELS[t]}</button>))}</div></div>
              <div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"5px"}}>Schedule (blank = every day)</div><div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>{DAYS_OF_WEEK.map((d,i)=>(<button key={d} onClick={()=>setH(p=>({...p,scheduleDays:p.scheduleDays.includes(i)?p.scheduleDays.filter(x=>x!==i):[...p.scheduleDays,i]}))} style={{padding:"5px 8px",fontSize:"10px",cursor:"pointer",background:h.scheduleDays.includes(i)?"rgba(139,92,246,0.18)":surface,border:`1px solid ${h.scheduleDays.includes(i)?"#8b5cf6":border}`,borderRadius:"6px",color:h.scheduleDays.includes(i)?"#a78bfa":muted}}>{d}</button>))}</div></div>
              <div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"3px"}}>🔔 Reminder time (optional)</div><div style={{fontSize:"10px",color:muted,marginBottom:"5px"}}>Browser notification at this time each day</div><input type="time" value={h.notificationTime} onChange={e=>setH(p=>({...p,notificationTime:e.target.value}))} style={{background:surface,border:`1px solid ${border}`,borderRadius:"10px",padding:"9px 12px",color:text,fontSize:"13px",outline:"none",colorScheme:"dark"}}/>{h.notificationTime&&<div style={{fontSize:"10px",color:"#22c55e",marginTop:"4px"}}>✅ Reminder set for {h.notificationTime}</div>}{h.notificationTime&&typeof Notification!=="undefined"&&Notification.permission!=="granted"&&(<button onClick={()=>Notification.requestPermission()} style={{marginTop:"6px",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:"8px",padding:"5px 12px",color:"#86efac",fontSize:"11px",cursor:"pointer"}}>Enable notifications ↗</button>)}</div>
              <div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"5px"}}>Difficulty (affects XP)</div><div style={{display:"flex",gap:"5px"}}>{Object.entries(DIFFICULTY).map(([k,v])=>(<button key={k} onClick={()=>setH(p=>({...p,difficulty:k}))} style={{flex:1,padding:"7px 4px",fontSize:"10px",cursor:"pointer",background:h.difficulty===k?v.color+"22":surface,border:`1px solid ${h.difficulty===k?v.color:border}`,borderRadius:"8px",color:h.difficulty===k?v.color:muted,fontWeight:h.difficulty===k?600:400}}>{v.label} +{v.xp}XP</button>))}</div></div>
            </>)}
            {h.type==="break"&&(<div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"5px"}}>Savings tracker (optional)</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px",marginBottom:"7px"}}><div><div style={{fontSize:"9px",color:muted,marginBottom:"3px"}}>Cost per unit (£)</div><input type="number" value={h.costPerUnit} onChange={e=>setH(p=>({...p,costPerUnit:e.target.value}))} placeholder="0.50" style={{width:"100%",background:surface,border:`1px solid ${border}`,borderRadius:"8px",padding:"8px 10px",color:text,fontSize:"12px",outline:"none",boxSizing:"border-box"}}/></div><div><div style={{fontSize:"9px",color:muted,marginBottom:"3px"}}>Per day</div><input type="number" value={h.unitsPerDay} onChange={e=>setH(p=>({...p,unitsPerDay:e.target.value}))} placeholder="10" style={{width:"100%",background:surface,border:`1px solid ${border}`,borderRadius:"8px",padding:"8px 10px",color:text,fontSize:"12px",outline:"none",boxSizing:"border-box"}}/></div></div><input value={h.unit} onChange={e=>setH(p=>({...p,unit:e.target.value}))} placeholder="Unit (e.g. cigarettes, drinks)" style={{width:"100%",background:surface,border:`1px solid ${border}`,borderRadius:"8px",padding:"8px 10px",color:text,fontSize:"12px",outline:"none",boxSizing:"border-box"}}/>{yearSave>0&&<div style={{marginTop:"7px",padding:"7px 12px",background:"rgba(34,197,94,0.07)",border:"1px solid rgba(34,197,94,0.16)",borderRadius:"8px",fontSize:"11px",color:"#86efac"}}>💰 £{yearSave.toFixed(0)}/year you could save!</div>}</div>)}
            <div style={{marginBottom:"11px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"5px"}}>Icon</div><div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>{ICONS.map(icon=>(<button key={icon} onClick={()=>setH(p=>({...p,icon}))} style={{width:"30px",height:"30px",borderRadius:"7px",fontSize:"14px",cursor:"pointer",border:`2px solid ${h.icon===icon?"#8b5cf6":border}`,background:h.icon===icon?"rgba(139,92,246,0.16)":surface}}>{icon}</button>))}</div></div>
            <div style={{marginBottom:"18px"}}><div style={{fontSize:"9px",color:muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"5px"}}>Colour</div><div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>{COLORS.map(color=>(<button key={color} onClick={()=>setH(p=>({...p,color}))} style={{width:"22px",height:"22px",borderRadius:"50%",background:color,border:h.color===color?"3px solid white":"2px solid transparent",cursor:"pointer"}}/>))}</div></div>
            <div style={{display:"flex",gap:"8px"}}><button onClick={onClose} style={{flex:1,padding:"12px",background:surface,border:"none",borderRadius:"12px",color:muted,fontSize:"12px",cursor:"pointer"}}>Cancel</button><button onClick={()=>h.name.trim()&&onAdd(h)} style={{flex:2,padding:"12px",border:"none",borderRadius:"12px",color:"white",fontSize:"12px",fontWeight:700,cursor:"pointer",background:h.type==="break"?"linear-gradient(135deg,#ef4444,#f97316)":"linear-gradient(135deg,#8b5cf6,#3b82f6)",opacity:h.name.trim()?1:0.4}}>{h.type==="break"?"Add to break list 🚫":"Add to stack 🧱"}</button></div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HabitStack />);
  </script>
</body>
</html>
